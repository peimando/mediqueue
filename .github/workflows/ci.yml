name: CI - MediQueue

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
      - develop
      - feature/**
      - fix/**
      - chore/**

  pull_request:
    branches:
      - main
      - master
      - develop

env:
  NODE_VERSION: 24        # ✅ Actualizado de 20 a 24
  CI: true

jobs:
  lint:
    name: 🔍 Lint Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Instalar dependencias backend
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

  test:
    name: 🧪 Unit Tests Backend
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Instalar dependencias backend
        run: npm ci

      - name: Ejecutar tests unitarios
        run: npm test

  integration:
    name: 🗄️ Integration Tests Backend
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: mediqueue_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mediqueue_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:test123@localhost:5433/mediqueue_test
      JWT_SECRET: supersecret_test_key_123456789_123456789
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      PORT: 3000

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Instalar dependencias backend
        run: npm ci

      - name: Ejecutar migraciones
        run: npm run migrate

      - name: Ejecutar tests de integración
        run: npm run test:integration

  build-frontend:
    name: ⚛️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js para frontend
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verificar estructura frontend
        run: |
          echo "📁 Contenido de /frontend:"
          ls -la frontend/
          echo "📄 package.json del frontend:"
          cat frontend/package.json

      - name: Instalar dependencias frontend
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Guardar build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-backend:
    name: 🏗️ Build Backend
    runs-on: ubuntu-latest
    needs: [test, integration]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Instalar dependencias backend
        run: npm ci

      - name: Build backend
        run: npm run build --if-present

  ci-success:
    name: ✅ CI completado
    runs-on: ubuntu-latest
    needs:
      - test
      - integration
      - build-frontend
      - build-backend

    steps:
      - name: OK
        run: echo "✅ CI completado correctamente"
